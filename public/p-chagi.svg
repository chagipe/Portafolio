<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0a1f"/>
      <stop offset="100%" stop-color="#13162D"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#160d35"/>
      <stop offset="100%" stop-color="#0d0a1f"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="80" y="60" width="640" height="380" rx="12"/>
    </clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <ellipse cx="600" cy="150" rx="200" ry="120" fill="#7c3aed" opacity="0.15" filter="url(#blur)"/>
  <ellipse cx="150" cy="380" rx="160" ry="100" fill="#ef4444" opacity="0.08" filter="url(#blur)"/>

  <!-- Screen frame -->
  <rect x="80" y="60" width="640" height="380" rx="12" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>

  <g clip-path="url(#screenClip)">
    <rect x="80" y="60" width="640" height="380" fill="url(#screen)"/>

    <!-- Navbar -->
    <rect x="80" y="60" width="640" height="36" fill="#0d0a1f"/>
    <circle cx="106" cy="78" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="122" cy="78" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="138" cy="78" r="5" fill="#6ee7b7" opacity="0.8"/>
    <text x="180" y="82" font-family="monospace" font-size="12" fill="#c084fc" font-weight="bold">⚡ ChagiControl</text>
    <rect x="560" y="66" width="140" height="20" rx="4" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
    <text x="630" y="80" font-family="monospace" font-size="9" fill="#fca5a5" text-anchor="middle">🔴 TICKET URGENTE</text>

    <!-- Sidebar -->
    <rect x="80" y="96" width="130" height="344" fill="#0d0a1f"/>
    <rect x="92" y="110" width="106" height="26" rx="5" fill="#7c3aed"/>
    <text x="145" y="127" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle">Dashboard</text>
    <rect x="92" y="142" width="106" height="22" rx="4" fill="#1e1040"/>
    <text x="145" y="157" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">Tickets</text>
    <text x="145" y="182" font-family="monospace" font-size="10" fill="#4c1d95" text-anchor="middle">Técnicos</text>
    <text x="145" y="204" font-family="monospace" font-size="10" fill="#4c1d95" text-anchor="middle">Reportes</text>
    <text x="145" y="226" font-family="monospace" font-size="10" fill="#4c1d95" text-anchor="middle">Configuración</text>
    <rect x="92" y="382" width="106" height="40" rx="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="0.8"/>
    <text x="145" y="398" font-family="monospace" font-size="8" fill="#fca5a5" text-anchor="middle">MODO ADMIN</text>
    <text x="145" y="412" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle">Acceso restringido</text>

    <!-- Stats -->
    <rect x="224" y="100" width="100" height="60" rx="7" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="274" y="118" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">PENDIENTES</text>
    <text x="274" y="142" font-family="monospace" font-size="24" fill="#e9d5ff" text-anchor="middle" font-weight="bold">14</text>
    <text x="274" y="154" font-family="monospace" font-size="7" fill="#fbbf24" text-anchor="middle">tickets</text>

    <rect x="334" y="100" width="100" height="60" rx="7" fill="#1e1040" stroke="#ef4444" stroke-width="1"/>
    <text x="384" y="118" font-family="monospace" font-size="8" fill="#fca5a5" text-anchor="middle">URGENTES</text>
    <text x="384" y="142" font-family="monospace" font-size="24" fill="#fca5a5" text-anchor="middle" font-weight="bold">3</text>
    <text x="384" y="154" font-family="monospace" font-size="7" fill="#ef4444" text-anchor="middle">alta prioridad</text>

    <rect x="444" y="100" width="100" height="60" rx="7" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="494" y="118" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">RESUELTOS</text>
    <text x="494" y="142" font-family="monospace" font-size="24" fill="#6ee7b7" text-anchor="middle" font-weight="bold">42</text>
    <text x="494" y="154" font-family="monospace" font-size="7" fill="#6ee7b7" text-anchor="middle">este mes</text>

    <rect x="554" y="100" width="154" height="60" rx="7" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="631" y="118" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">BUSCAR TICKET</text>
    <rect x="566" y="124" width="130" height="20" rx="4" fill="#0d0a1f"/>
    <text x="631" y="137" font-family="monospace" font-size="8" fill="#4c1d95" text-anchor="middle">Buscar por asunto...</text>

    <!-- Ticket rows -->
    <rect x="224" y="174" width="490" height="36" rx="6" fill="#2d1b69" stroke="#ef4444" stroke-width="1"/>
    <rect x="230" y="180" width="6" height="24" rx="2" fill="#ef4444"/>
    <text x="246" y="193" font-family="monospace" font-size="9" fill="#fca5a5" font-weight="bold">#0041 — Servidor caído en producción</text>
    <text x="706" y="189" font-family="monospace" font-size="8" fill="#fca5a5" text-anchor="end">ALTA</text>
    <text x="706" y="202" font-family="monospace" font-size="7" fill="#6d28d9" text-anchor="end">Sin asignar</text>

    <rect x="224" y="218" width="490" height="36" rx="6" fill="#160d35" stroke="#7c3aed" stroke-width="0.5"/>
    <rect x="230" y="224" width="6" height="24" rx="2" fill="#fbbf24"/>
    <text x="246" y="237" font-family="monospace" font-size="9" fill="#e9d5ff">#0040 — Error de login en sistema de caja</text>
    <text x="706" y="233" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="end">MEDIA</text>
    <text x="706" y="246" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="end">Luis R.</text>

    <rect x="224" y="262" width="490" height="36" rx="6" fill="#160d35" stroke="#7c3aed" stroke-width="0.5"/>
    <rect x="230" y="268" width="6" height="24" rx="2" fill="#6ee7b7"/>
    <text x="246" y="281" font-family="monospace" font-size="9" fill="#e9d5ff">#0039 — Impresora no reconocida en área ventas</text>
    <text x="706" y="277" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="end">BAJA</text>
    <text x="706" y="290" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="end">Ana M.</text>

    <rect x="224" y="306" width="490" height="36" rx="6" fill="#160d35" stroke="#7c3aed" stroke-width="0.5"/>
    <rect x="230" y="312" width="6" height="24" rx="2" fill="#ef4444"/>
    <text x="246" y="325" font-family="monospace" font-size="9" fill="#fca5a5">#0038 — VPN no conecta para usuario remoto</text>
    <text x="706" y="321" font-family="monospace" font-size="8" fill="#fca5a5" text-anchor="end">ALTA</text>
    <text x="706" y="334" font-family="monospace" font-size="7" fill="#a78bfa" text-anchor="end">Carlos T.</text>

    <rect x="224" y="350" width="490" height="36" rx="6" fill="#160d35" stroke="#7c3aed" stroke-width="0.3" opacity="0.5"/>
    <rect x="230" y="356" width="6" height="24" rx="2" fill="#6ee7b7" opacity="0.5"/>
    <text x="246" y="369" font-family="monospace" font-size="9" fill="#6d28d9">#0037 — Actualización de antivirus en equipos</text>
    <text x="706" y="365" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="end" opacity="0.5">✓ RESUELTO</text>
  </g>

  <rect x="80" y="60" width="640" height="36" rx="12" fill="white" opacity="0.02"/>
</svg>
