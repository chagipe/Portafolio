<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="100%" stop-color="#1a0533"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1040"/>
      <stop offset="100%" stop-color="#13162D"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <clipPath id="screenClip">
      <rect x="80" y="60" width="640" height="380" rx="12"/>
    </clipPath>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="400" cy="200" rx="280" ry="140" fill="#7c3aed" opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="180" cy="380" rx="120" ry="80" fill="#a855f7" opacity="0.1" filter="url(#blur)"/>

  <!-- Screen frame -->
  <rect x="80" y="60" width="640" height="380" rx="12" fill="#1a1040" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Screen content -->
  <g clip-path="url(#screenClip)">
    <rect x="80" y="60" width="640" height="380" fill="url(#screen)"/>

    <!-- Navbar -->
    <rect x="80" y="60" width="640" height="36" fill="#160d35"/>
    <circle cx="106" cy="78" r="5" fill="#ef4444" opacity="0.8"/>
    <circle cx="122" cy="78" r="5" fill="#fbbf24" opacity="0.8"/>
    <circle cx="138" cy="78" r="5" fill="#6ee7b7" opacity="0.8"/>
    <rect x="260" y="68" width="280" height="20" rx="4" fill="#1a0533"/>
    <text x="400" y="82" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">sistema-ventas-one.vercel.app</text>

    <!-- Sidebar -->
    <rect x="80" y="96" width="140" height="344" fill="#160d35"/>
    <rect x="92" y="112" width="116" height="28" rx="6" fill="#7c3aed"/>
    <text x="150" y="130" font-family="monospace" font-size="11" fill="#fff" text-anchor="middle">Dashboard</text>
    <text x="150" y="162" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Inventario</text>
    <text x="150" y="186" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Ventas POS</text>
    <text x="150" y="210" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Productos</text>
    <text x="150" y="234" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Reportes</text>
    <text x="150" y="258" font-family="monospace" font-size="11" fill="#6d28d9" text-anchor="middle">Proveedores</text>
    <rect x="92" y="390" width="116" height="38" rx="6" fill="#2d1b69"/>
    <text x="150" y="413" font-family="monospace" font-size="10" fill="#a78bfa" text-anchor="middle">admin@sistema.com</text>

    <!-- Main content -->
    <!-- Stat cards -->
    <rect x="236" y="104" width="128" height="72" rx="8" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="300" y="124" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">VENTAS HOY</text>
    <text x="300" y="148" font-family="monospace" font-size="22" fill="#e9d5ff" text-anchor="middle" font-weight="bold">S/4,280</text>
    <text x="300" y="166" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">↑ 12.4%</text>

    <rect x="376" y="104" width="128" height="72" rx="8" fill="#1e1040" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="440" y="124" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">PRODUCTOS</text>
    <text x="440" y="148" font-family="monospace" font-size="22" fill="#e9d5ff" text-anchor="middle" font-weight="bold">1,342</text>
    <text x="440" y="166" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">en stock</text>

    <rect x="516" y="104" width="128" height="72" rx="8" fill="#1e1040" stroke="#a855f7" stroke-width="0.8"/>
    <text x="580" y="124" font-family="monospace" font-size="9" fill="#a78bfa" text-anchor="middle">MENSUAL</text>
    <text x="580" y="148" font-family="monospace" font-size="20" fill="#c084fc" text-anchor="middle" font-weight="bold">S/38,420</text>
    <text x="580" y="166" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="middle">↑ 8.1%</text>

    <!-- Chart -->
    <rect x="236" y="190" width="280" height="180" rx="8" fill="#160d35" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="256" y="210" font-family="monospace" font-size="10" fill="#a78bfa">Ventas semanales</text>
    <rect x="252" y="320" width="20" height="40" rx="3" fill="#7c3aed" opacity="0.7"/>
    <rect x="282" y="298" width="20" height="62" rx="3" fill="#7c3aed" opacity="0.8"/>
    <rect x="312" y="278" width="20" height="82" rx="3" fill="#a855f7"/>
    <rect x="342" y="308" width="20" height="52" rx="3" fill="#7c3aed" opacity="0.8"/>
    <rect x="372" y="262" width="20" height="98" rx="3" fill="#c084fc"/>
    <rect x="402" y="285" width="20" height="75" rx="3" fill="#a855f7" opacity="0.9"/>
    <rect x="432" y="255" width="20" height="105" rx="3" fill="#c084fc"/>
    <line x1="248" y1="358" x2="496" y2="358" stroke="#2d1b69" stroke-width="0.5"/>

    <!-- POS Panel -->
    <rect x="528" y="190" width="188" height="180" rx="8" fill="#160d35" stroke="#7c3aed" stroke-width="0.8"/>
    <text x="548" y="210" font-family="monospace" font-size="10" fill="#a78bfa">Punto de Venta</text>
    <rect x="544" y="218" width="156" height="20" rx="4" fill="#1a0533"/>
    <text x="622" y="232" font-family="monospace" font-size="8" fill="#4c1d95" text-anchor="middle">Buscar producto...</text>
    <rect x="544" y="244" width="156" height="16" rx="3" fill="#1e1040"/>
    <text x="556" y="255" font-family="monospace" font-size="8" fill="#e9d5ff">Coca Cola 1L</text>
    <text x="692" y="255" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="end">S/ 4.50</text>
    <rect x="544" y="264" width="156" height="16" rx="3" fill="#1e1040"/>
    <text x="556" y="275" font-family="monospace" font-size="8" fill="#e9d5ff">Arroz 1kg</text>
    <text x="692" y="275" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="end">S/ 3.80</text>
    <rect x="544" y="284" width="156" height="16" rx="3" fill="#1e1040"/>
    <text x="556" y="295" font-family="monospace" font-size="8" fill="#e9d5ff">Leche Gloria 1L</text>
    <text x="692" y="295" font-family="monospace" font-size="8" fill="#6ee7b7" text-anchor="end">S/ 4.20</text>
    <line x1="544" y1="308" x2="700" y2="308" stroke="#7c3aed" stroke-width="0.5"/>
    <text x="556" y="322" font-family="monospace" font-size="10" fill="#a78bfa">Total:</text>
    <text x="692" y="322" font-family="monospace" font-size="10" fill="#c084fc" text-anchor="end" font-weight="bold">S/ 12.50</text>
    <rect x="544" y="330" width="156" height="26" rx="5" fill="url(#purple)"/>
    <text x="622" y="347" font-family="monospace" font-size="10" fill="#fff" text-anchor="middle" font-weight="bold">Cobrar</text>
  </g>

  <!-- Screen shine -->
  <rect x="80" y="60" width="640" height="40" rx="12" fill="white" opacity="0.02"/>
</svg>
